name: Playwright Post-Deploy Validation

on:
  push:
    branches:
      - main
  deployment_status:

permissions:
  contents: read
  deployments: read

jobs:
  playwright-tests:
    if: github.event_name == 'push' || (github.event_name == 'deployment_status' && github.event.deployment_status.state == 'success' && github.event.deployment.environment == 'test')
    runs-on: ubuntu-latest
    environment: test
    env:
      BASE_URL: ${{ vars.TEST_BASE_URL }}
      API_URL: ${{ vars.TEST_API_URL }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Playwright UI tests
        run: |
          pytest tests/ui \
            -v \
            --junitxml=reports/junit.xml \
            --html=reports/pytest-report.html \
            --self-contained-html

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-reports
          path: reports/
          retention-days: 14
